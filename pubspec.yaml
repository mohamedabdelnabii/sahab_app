name: sahab
description: "sahab Premium Weather App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.9
  country_picker: ^2.0.27
  flutter_bloc: ^9.1.1
  flutter_html: ^3.0.0
  equatable: ^2.0.8
  connectivity_plus: ^7.0.0
  dio: ^5.9.2
  http: ^1.6.0
  get_it: ^9.2.1
  glass_kit: ^4.0.2
  intl: ^0.20.2
  lottie: ^3.3.2
  flutter_spinkit: ^5.2.2
  cached_network_image: ^3.4.1
  path_provider: ^2.1.5
  flutter_native_splash: ^2.4.7
  flutter_screenutil: ^5.9.3
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  go_router: ^17.1.0
  hive_ce: ^2.19.3
  lottie_native:
  hive_ce_flutter: ^2.3.4
  shared_preferences: ^2.5.5
  pretty_dio_logger: ^1.4.0
  shimmer: ^3.0.0
  skeletonizer: ^2.1.3
  flutter_secure_storage: ^10.0.0
  font_awesome_flutter: ^11.0.0
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  url_launcher: ^6.3.2
  json_annotation: ^4.11.0
  freezed_annotation: ^3.1.0
  retrofit: ^4.1.0
  flutter_local_notifications: ^17.0.0
  permission_handler: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  analyzer: ^10.0.0
  build_runner: ^2.13.1
  freezed: ^3.2.5
  hive_ce_generator: ^1.11.1
  intl_utils: ^2.8.14
  json_serializable: ^6.13.1
  retrofit_generator: ^10.2.3
  flutter_launcher_icons: ^0.14.4
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/images/png/
    - assets/images/lottie/

  fonts:
    - family: Tajawal
      fonts:
        - asset: assets/fonts/tajawal/Tajawal-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/tajawal/Tajawal-Light.ttf
          weight: 300
        - asset: assets/fonts/tajawal/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/tajawal/Tajawal-Medium.ttf
          weight: 500
        - asset: assets/fonts/tajawal/Tajawal-Bold.ttf
          weight: 700
        - asset: assets/fonts/tajawal/Tajawal-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/tajawal/Tajawal-Black.ttf
          weight: 900

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/png/app_icon.png

flutter_intl:
  enabled: true

flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/helpers/
  filename: app_assets.dart
  field_prefix: null